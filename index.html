<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صيدلية بعثة الحج الكويتية - كشف  ادوية منى وعرفه</title>
<style>
:root {
  --primary:#0f4c81;
  --primary-dark:#082f52;
  --accent:#19a7ce;
  --bg:#f3f7fb;
  --card:#ffffff;
  --text:#172033;
  --muted:#6b7280;
  --border:#e5e7eb;
  --arafat:#7c3aed;
  --mina:#0f766e;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family: Arial, Tahoma, sans-serif;
  background:linear-gradient(135deg,#eaf4ff,#f8fbff);
  color:var(--text);
  min-height:100vh;
}
.page {
  width:100%;
  max-width:1180px;
  margin:0 auto;
  padding:14px;
}
.header {
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:white;
  border-radius:28px;
  padding:22px 16px;
  text-align:center;
  box-shadow:0 18px 42px rgba(15,76,129,.22);
  margin-bottom:12px;
}
.header h1 {
  margin:0;
  font-size:24px;
  line-height:1.7;
  font-weight:900;
}
.header p {
  margin:8px 0 0;
  opacity:.92;
  font-size:14px;
}
.toolbar {
  position:sticky;
  top:0;
  z-index:50;
  background:rgba(243,247,251,.96);
  backdrop-filter:blur(14px);
  border:1px solid rgba(229,231,235,.95);
  border-radius:22px;
  box-shadow:0 12px 30px rgba(15,76,129,.12);
  padding:12px;
  margin-bottom:14px;
}
.controls {
  display:grid;
  grid-template-columns:2fr 1fr 1fr auto;
  gap:10px;
  align-items:center;
}
input, select, button {
  width:100%;
  min-height:50px;
  border:1px solid var(--border);
  border-radius:16px;
  padding:0 14px;
  font-size:16px;
  outline:none;
  background:white;
}
input:focus, select:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(25,167,206,.12);
}
button {
  background:var(--primary);
  color:white;
  border:none;
  font-weight:800;
  cursor:pointer;
  padding:0 18px;
}
button:hover { background:var(--primary-dark); }
.stats {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
  color:var(--muted);
  font-size:13px;
}
.badge {
  background:white;
  border:1px solid var(--border);
  padding:8px 12px;
  border-radius:999px;
}
.cards-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(295px, 1fr));
  gap:14px;
}
.med-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:15px;
  box-shadow:0 12px 28px rgba(15,76,129,.10);
  transition:.18s ease;
  direction:ltr;
  text-align:left;
}
.med-card:hover {
  transform:translateY(-2px);
  box-shadow:0 16px 34px rgba(15,76,129,.16);
}
.med-title {
  font-size:16.5px;
  font-weight:900;
  color:var(--primary-dark);
  margin-bottom:8px;
  line-height:1.45;
}
.med-generic {
  font-size:14px;
  color:#374151;
  line-height:1.5;
  margin-bottom:12px;
}
.locations {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}
.locations.single-location {
  grid-template-columns:1fr;
}
.loc-box.hidden-location {
  display:none;
}
.loc-box {
  border-radius:18px;
  padding:10px;
  border:1px solid var(--border);
  background:#f8fafc;
}
.loc-title {
  direction:rtl;
  text-align:right;
  font-weight:900;
  font-size:13px;
  margin-bottom:7px;
}
.loc-box.arafat {
  background:linear-gradient(135deg,#f3e8ff,#ede9fe);
  border:2px solid #c4b5fd;
}
.loc-box.arafat .loc-title {
  color:var(--arafat);
  font-size:15px;
}
.loc-box.mina {
  background:linear-gradient(135deg,#dcfce7,#ecfdf5);
  border:2px solid #86efac;
}
.loc-box.mina .loc-title {
  color:var(--mina);
  font-size:15px;
}
.loc-line {
  display:flex;
  justify-content:space-between;
  gap:8px;
  font-size:13px;
  padding:3px 0;
}
.loc-label {
  color:var(--muted);
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
}
.loc-value {
  font-weight:900;
  color:#111827;
  font-size:22px;
  line-height:1.2;
  padding:4px 0;
}
.card-meta {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}
.pill {
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:#eef7ff;
  color:#0b355a;
  border:1px solid #d6ecff;
  padding:7px 10px;
  border-radius:999px;
  font-size:12.5px;
  font-weight:800;
}
.pill.type {
  background:#ecfdf5;
  color:#065f46;
  border-color:#ccfbf1;
}
.empty {
  display:none;
  text-align:center;
  color:var(--muted);
  background:white;
  border:1px dashed var(--border);
  border-radius:22px;
  padding:30px;
  margin-top:10px;
}
.footer-note {
  text-align:center;
  margin-top:35px;
  font-size:10.5px;
  opacity:.30;
  color:#111827;
}
@media (max-width:850px) {
  .page { padding:10px; }
  .header { border-radius:22px; padding:20px 12px; }
  .header h1 { font-size:19px; }
  .summary-boxes { grid-template-columns:1fr; }
  .controls { grid-template-columns:1fr; }
  .toolbar { border-radius:18px; padding:10px; }
  .cards-grid { grid-template-columns:1fr; gap:10px; }
  .med-card { border-radius:20px; padding:14px; }
  .locations { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<main class="page">
  <header class="header">
    <div style="font-size:52px;margin-bottom:8px;">🇰🇼</div>
    <h1>صيدلية بعثة الحج الكويتية<br><span style="font-size:0.9em;font-weight:700;">كشف الصيادلة فقط</span></h1>
    <p>كشف لكميات ومواقع الأدوية لمنى وعرفه</p>
  </header>

  <section class="toolbar">
    
    </div>
    <div class="controls">
      <input id="searchInput" type="search" placeholder="Search medicine, generic, type, quantity, or location...">
      <select id="typeFilter"><option value="">All Types</option></select>
      <select id="placeFilter">
        <option value="">الكل: منى + عرفه</option>
        <option value="arafat">عرفه فقط</option>
        <option value="mina">منى فقط</option>
      </select>
      <button type="button" onclick="clearFilters()">Clear</button>
    </div>
    <div class="stats">
      <span class="badge">Total: <strong id="totalCount">0</strong></span>
      <span class="badge">Showing: <strong id="shownCount">0</strong></span>
    </div>
  </section>

  <section id="cardsGrid" class="cards-grid"></section>
  <div id="emptyState" class="empty">No matching results found</div>
  <div class="footer-note">Prepared by Ph. Talal Alenezi</div>
</main>

const searchInput = document.getElementById("searchInput");
const typeFilter = document.getElementById("typeFilter");
const placeFilter = document.getElementById("placeFilter");
const cardsGrid = document.getElementById("cardsGrid");
const emptyState = document.getElementById("emptyState");
const totalCount = document.getElementById("totalCount");
const shownCount = document.getElementById("shownCount");

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function fillTypes() {
  const types = [...new Set(records.map(r => r.type).filter(Boolean))].sort();
  types.forEach(type => {
    const option = document.createElement("option");
    option.value = type;
    option.textContent = type;
    typeFilter.appendChild(option);
  });
}

function isPositiveValue(v) {
  const s = String(v ?? "").trim();
  return s !== "" && s !== "0" && s !== "-";
}

function renderCards() {
  const q = searchInput.value.trim().toLowerCase();
  const selectedType = typeFilter.value;
  const selectedPlace = placeFilter.value;

  const filtered = records.filter(item => {
    const haystack = `${item.sn} ${item.trade} ${item.generic} ${item.arafat_qty} ${item.arafat_location} ${item.mina_qty} ${item.mina_location} ${item.type}`.toLowerCase();
    const matchesSearch = haystack.includes(q);
    const matchesType = !selectedType || item.type === selectedType;
    let matchesPlace = true;
    if (selectedPlace === "arafat") matchesPlace = isPositiveValue(item.arafat_qty) || isPositiveValue(item.arafat_location);
    if (selectedPlace === "mina") matchesPlace = isPositiveValue(item.mina_qty) || isPositiveValue(item.mina_location);
    return matchesSearch && matchesType && matchesPlace;
  });

  cardsGrid.innerHTML = filtered.map(item => `
    <article class="med-card">
      <div class="med-title">${escapeHtml(item.trade)}</div>
      <div class="med-generic">${escapeHtml(item.generic || "-")}</div>

      <div class="locations ${selectedPlace ? 'single-location' : ''}">
        <div class="loc-box arafat ${selectedPlace === 'mina' ? 'hidden-location' : ''}">
          <div class="loc-title">🟣 عرفه</div>
          <div class="loc-line"><span class="loc-label">📦 Quantity</span><span class="loc-value">${escapeHtml(item.arafat_qty || "-")}</span></div>
          <div class="loc-line"><span class="loc-label">📍 Location</span><span class="loc-value">${escapeHtml(item.arafat_location || "-")}</span></div>
        </div>
        <div class="loc-box mina ${selectedPlace === 'arafat' ? 'hidden-location' : ''}">
          <div class="loc-title">🟢 منى</div>
          <div class="loc-line"><span class="loc-label">📦 Quantity</span><span class="loc-value">${escapeHtml(item.mina_qty || "-")}</span></div>
          <div class="loc-line"><span class="loc-label">📍 Location</span><span class="loc-value">${escapeHtml(item.mina_location || "-")}</span></div>
        </div>
      </div>

      <div class="card-meta">
        <span class="pill type">${escapeHtml(item.type || "-")}</span>
      </div>
    </article>
  `).join("");

  totalCount.textContent = records.length;
  document.getElementById("totalTop").textContent = records.length;
  shownCount.textContent = filtered.length;
  emptyState.style.display = filtered.length ? "none" : "block";
}

function clearFilters() {
  searchInput.value = "";
  typeFilter.value = "";
  placeFilter.value = "";
  renderCards();
}

searchInput.addEventListener("input", renderCards);
typeFilter.addEventListener("change", renderCards);
placeFilter.addEventListener("change", renderCards);

fillTypes();
renderCards();
</script>
</body>
